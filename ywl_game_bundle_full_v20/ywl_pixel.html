<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>异闻录：闻风丧胆（像素版MVP）</title>
  <style>
    :root{
      /* 轻亮风格（更接近手机休闲游戏UI） */
      --bg:#f6f7fb;
      --panel:#ffffff;
      --border:#e5e7eb;
      --text:#0f172a;
      --muted:#64748b;
      --accent:#2563eb;
      --bad:#ef4444;
      --good:#10b981;
      --warn:#f59e0b;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:
        radial-gradient(900px 700px at 20% 0%, rgba(37,99,235,0.12) 0%, rgba(246,247,251,0) 60%),
        radial-gradient(900px 700px at 90% 20%, rgba(245,158,11,0.12) 0%, rgba(246,247,251,0) 55%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      overscroll-behavior: none;
    }
    .wrap{
      max-width: none;
      margin: 0 auto;
      padding: 12px;
      display:grid;
      grid-template-columns: 1fr 340px;
      gap: 14px;
      align-items:start;
    }
    @media (max-width: 980px){
      .wrap{ grid-template-columns: 1fr; }
    }
    .panel{
      background: var(--panel);
      border:1px solid var(--border);
      border-radius: 14px;
      overflow:hidden;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }
    .hd{
      padding: 12px 14px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      background: rgba(15,23,42,0.02);
    }
    .title{ font-weight: 800; }
    .sub{ color: var(--muted); font-size: 12px; }
    .bd{ padding: 14px; }
    .gameStage{
      position: relative;
      width: 100%;
    }
    canvas{
      width: 100%;
      height: auto;
      /* 不完全像素风：允许平滑 */
      image-rendering: auto;
      background: #ffffff;
      border:1px solid var(--border);
      border-radius: 12px;
      display:block;
    }
    .promptBar{
      position:absolute;
      left: 10px;
      top: 10px;
      right: 260px; /* 默认给右上角小地图让位（会在JS里按实际小地图宽度动态调整） */
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(15,23,42,0.14);
      color: rgba(15,23,42,0.92);
      font-size: 13px;
      font-weight: 650;
      line-height: 1.35;
      backdrop-filter: blur(8px);
      pointer-events: none;
      box-shadow: 0 10px 30px rgba(15,23,42,0.10);
    }

    /* 手机横屏：尽量把画面做大，隐藏右侧面板 */
    @media (max-width: 980px) and (orientation: landscape){
      .wrap{ padding: 6px; }
      .sidePanel{ display:none; }
      .hd .sub{ display:none; }
    }

    /* 一键横屏放大（全屏） */
    body.wideMode{ overflow:hidden; }
    body.wideMode .wrap{ padding:0; grid-template-columns: 1fr; gap:0; }
    body.wideMode .panel{ border-radius:0; border:none; box-shadow:none; }
    body.wideMode .sidePanel{ display:none; }
    body.wideMode .hd{ display:none; }
    body.wideMode .bd{ padding:0; }
    body.wideMode .gameStage{
      position: fixed;
      inset: 0;
      z-index: 40;
    }
    /* 旋转的是“舞台容器”，让提示条/弹窗/小地图一起旋转为横屏 */
    body.wideMode .stageInner{
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--stageW, 960px);
      height: var(--stageH, 540px);
      transform-origin: center center;
      transform: translate(-50%, -50%) rotate(var(--wideRot, 0deg)) scale(var(--wideScale, 1));
    }
    body.wideMode canvas{
      width: 100%;
      height: 100%;
      position:absolute;
      left:0;
      top:0;
      border-radius: 0;
      border: none;
      transform: none;
    }
    /* 竖屏时也能“横屏大屏玩”：舞台旋转 90 度并缩放到屏幕内 */
    body.wideMode.widePortrait{ --wideRot: 90deg; }
    body.wideMode .touchBar{
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 50;
      display:flex;
      justify-content:space-between;
      gap: 12px;
      pointer-events: none;
      margin-top: 0;
    }
    body.wideMode .touchBar .joy,
    body.wideMode .touchBar .actPad{
      pointer-events: auto;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(15,23,42,0.14);
      border-radius: 14px;
      padding: 8px;
    }
    body.wideMode .touchBar .joy{ transform: scale(0.95); transform-origin: left bottom; }
    body.wideMode .touchBar .actPad{ min-width: 170px; }

    /* 开始界面：永远有“开始游戏”按钮 */
    .titleStart{
      position:absolute;
      inset:0;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding: 18px;
      background: linear-gradient(180deg, rgba(15,23,42,0.0) 55%, rgba(15,23,42,0.28) 100%);
      pointer-events:none;
    }
    .titleStart.hidden{ display:none; }
    .titleStart .box{
      pointer-events:auto;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content:center;
    }
    .titleStart .box button{
      font-size: 16px;
      padding: 12px 16px;
      border-radius: 14px;
    }
    .overlay{
      position:absolute;
      inset: 0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 14px;
      background: rgba(15,23,42,0.35);
    }
    .overlay.hidden{ display:none; }
    .modal{
      width: min(560px, 100%);
      background: rgba(255,255,255,0.97);
      border: 1px solid rgba(15,23,42,0.12);
      border-radius: 14px;
      overflow:hidden;
      box-shadow: 0 20px 80px rgba(15,23,42,0.20);
      animation: pop .16s ease-out;
    }
    @keyframes pop{
      from{ transform: translateY(8px) scale(0.98); opacity: 0; }
      to{ transform: translateY(0) scale(1); opacity: 1; }
    }
    .modalHd{
      padding: 10px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      border-bottom: 1px solid rgba(15,23,42,0.10);
    }
    .modalTitle{
      font-weight: 800;
      color: rgba(37,99,235,0.95);
      font-size: 14px;
    }
    .modalClose{
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 10px;
      font-size: 18px;
      line-height: 34px;
    }
    .modalBd{ padding: 12px; }
    .modalText{
      white-space: pre-wrap;
      color: rgba(15,23,42,0.88);
      font-size: 13px;
      line-height: 1.45;
    }
    .modalCustom{ margin-top: 10px; }
    .modalChoices{
      margin-top: 12px;
      display:flex;
      flex-wrap:wrap;
      gap: 10px;
    }
    .seatHud{
      display:flex;
      flex-wrap:wrap;
      gap: 8px;
      align-items:center;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .seatGrid{
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .seatCell{
      min-height: 44px;
      border-radius: 12px;
      border:1px solid rgba(15,23,42,0.12);
      background: rgba(15,23,42,0.03);
      color: rgba(15,23,42,0.90);
      font-weight: 700;
    }
    .seatCell.dim{
      color: rgba(170,178,197,0.35);
      background: rgba(255,255,255,0.02);
    }
    .seatCell.focus{
      border-color: rgba(110,231,255,0.62);
      box-shadow: 0 0 0 3px rgba(110,231,255,0.12);
    }
    .seatPad{
      margin-top: 10px;
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      align-items:center;
      justify-items:center;
    }
    .seatPad button{ width: 100%; }
    .seatPad .empty{ visibility:hidden; }
    .touchBar{
      margin-top: 12px;
      display:flex;
      gap: 12px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    /* 摇杆（替代方向键） */
    .joy{
      width: 170px;
      height: 170px;
      position: relative;
      user-select: none;
      touch-action: none;
    }
    .joyBase{
      position:absolute;
      inset:0;
      border-radius: 999px;
      background: rgba(15,23,42,0.06);
      border: 1px solid rgba(15,23,42,0.14);
    }
    .joyKnob{
      position:absolute;
      left:50%;
      top:50%;
      width: 72px;
      height: 72px;
      border-radius: 999px;
      transform: translate(-50%,-50%);
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(15,23,42,0.16);
      box-shadow: 0 14px 34px rgba(15,23,42,0.14);
    }
    .actPad{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap:wrap;
      touch-action:none;
    }
    .actPad button{ min-width: 92px; }
    /* 桌面端：使用键盘控制，隐藏触屏摇杆区避免干扰 */
    @media (pointer:fine){
      .touchBar{ display:none; }
    }
    .hudGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .schedulePanel{
      border: 1px solid rgba(15,23,42,0.10);
      background: rgba(15,23,42,0.02);
      border-radius: 14px;
      padding: 10px;
    }
    .schedulePanel .h{
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-weight: 800;
      color: rgba(15,23,42,0.85);
      margin-bottom: 8px;
      font-size: 13px;
    }
    .schedulePanel .rows{
      display:grid;
      gap: 6px;
      font-size: 12px;
      color: rgba(15,23,42,0.78);
    }
    .scheduleRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 12px;
      border: 1px solid rgba(15,23,42,0.06);
      background: rgba(255,255,255,0.55);
    }
    .scheduleRow .left{ display:flex; gap:8px; align-items:center; }
    .scheduleRow .tag{
      font-weight: 800;
      width: 28px;
      text-align:center;
      border-radius: 10px;
      padding: 3px 0;
      background: rgba(37,99,235,0.10);
      color: rgba(37,99,235,0.95);
    }
    .scheduleRow.done{
      opacity: 0.55;
      text-decoration: line-through;
    }
    .scheduleRow.current{
      border-color: rgba(37,99,235,0.35);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
    }
    .pill{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 8px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.03);
    }
    .pill b{ color: var(--text); }
    .pill.good{ border-color: rgba(124,255,178,0.22); }
    .pill.warn{ border-color: rgba(255,209,102,0.24); }
    .pill.bad{ border-color: rgba(255,90,122,0.24); }
    .btnRow{ display:flex; flex-wrap:wrap; gap:10px; }
    button{
      appearance:none;
      border:1px solid rgba(15,23,42,0.14);
      background: rgba(15,23,42,0.04);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 14px;
      cursor:pointer;
      transition: .12s ease;
    }
    button:hover{ background: rgba(15,23,42,0.07); transform: translateY(-1px); }
    button:disabled{ opacity:.45; cursor:not-allowed; transform:none; }
    button.primary{
      background: linear-gradient(180deg, rgba(37,99,235,0.18), rgba(37,99,235,0.06));
      border-color: rgba(37,99,235,0.36);
    }
    button.danger{
      background: linear-gradient(180deg, rgba(239,68,68,0.16), rgba(239,68,68,0.06));
      border-color: rgba(239,68,68,0.32);
    }
    .log{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      color: var(--muted);
      white-space: pre-wrap;
      max-height: 460px;
      overflow:auto;
      padding-right: 6px;
    }
    .line{ padding: 2px 0; border-bottom:1px dashed rgba(15,23,42,0.10); }
    .line:last-child{ border-bottom:none; }
    .tip{ color: var(--muted); font-size: 13px; margin-top: 10px; }

    /* 结算界面：彩纸屑动画 */
    .confetti{
      position: relative;
      height: 86px;
      overflow:hidden;
      border-radius: 12px;
      border: 1px dashed rgba(15,23,42,0.18);
      background: linear-gradient(180deg, rgba(37,99,235,0.08), rgba(245,158,11,0.06));
    }
    .confetti i{
      position:absolute;
      top:-12px;
      width: 10px;
      height: 14px;
      border-radius: 3px;
      opacity: .9;
      animation: fall 1.9s linear infinite;
    }
    @keyframes fall{
      0%{ transform: translateY(-20px) rotate(0deg); opacity:.0; }
      10%{ opacity:.9; }
      100%{ transform: translateY(120px) rotate(260deg); opacity:.0; }
    }
    .badgeRow{ display:flex; flex-wrap:wrap; gap:8px; margin-top: 10px; }
    .badgeChip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding: 6px 10px;
      border-radius: 999px;
      border:1px solid rgba(15,23,42,0.12);
      background: rgba(15,23,42,0.03);
      font-size: 12px;
      color: rgba(15,23,42,0.84);
    }
    .badgeChip b{ color: rgba(37,99,235,0.95); }
    .statGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .stat{
      padding: 10px;
      border-radius: 12px;
      border:1px solid rgba(15,23,42,0.10);
      background: rgba(15,23,42,0.02);
    }
    .stat .k{ font-size: 12px; color: var(--muted); }
    .stat .v{ font-size: 18px; font-weight: 900; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="hd">
        <div>
          <div class="title">异闻录：闻风丧胆（像素版MVP）</div>
          <div class="sub">方向键/WASD移动 · 交互按钮/空格进入入口 · 手机可玩（触屏方向键）</div>
        </div>
        <div class="btnRow">
          <button id="btnUsePerfume" title="使用香水：清新BUFF，降低臭圈掉SAN">使用香水</button>
          <button id="btnWide" title="全屏并建议横屏游玩">横屏放大</button>
          <button id="btnMute" title="开关音效">音效：开</button>
          <button id="btnBgm" title="开关背景音乐">音乐：开</button>
          <button id="btnMode" title="返回模式选择">模式</button>
          <button id="btnSave">存档</button>
          <button id="btnClear" class="danger">清档</button>
        </div>
      </div>
      <div class="bd">
        <div class="gameStage" id="gameStage">
          <div class="stageInner" id="stageInner">
            <div class="promptBar" id="promptBar">指引加载中…</div>
            <canvas id="game" width="960" height="540"></canvas>
            <div class="titleStart hidden" id="titleStart">
              <div class="box">
                <button id="btnStartGame" class="primary">开始游戏</button>
                <button id="btnContinueGame">继续游戏</button>
                <button id="btnWide2">横屏放大</button>
              </div>
            </div>
            <div class="overlay hidden" id="overlay">
              <div class="modal" role="dialog" aria-modal="true">
                <div class="modalHd">
                  <div class="modalTitle" id="ovTitle">提示</div>
                  <button class="modalClose" id="ovClose" aria-label="关闭">×</button>
                </div>
                <div class="modalBd">
                  <div class="modalText" id="ovText"></div>
                  <div class="modalCustom" id="ovCustom"></div>
                  <div class="modalChoices" id="ovChoices"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="touchBar" aria-label="触屏操作区">
          <div class="joy" id="joy" aria-label="摇杆">
            <div class="joyBase"></div>
            <div class="joyKnob" id="joyKnob"></div>
          </div>
          <div class="actPad">
            <button id="btnInteract" class="primary">交互</button>
            <button id="btnSchedule">课表</button>
            <button id="btnMenu">菜单</button>
          </div>
        </div>
        <div class="tip">玩法：走进蓝色大门会自动进入场景（也可点“交互”/按空格）；入口会按时间段锁定。红色臭圈会持续掉SAN（香水可减免）。</div>
      </div>
    </div>

    <div class="panel sidePanel">
      <div class="hd">
        <div>
          <div class="title">HUD / 日志</div>
          <div class="sub" id="objective">目标：活到第5天 + 五天内乐跑≥2次</div>
        </div>
      </div>
      <div class="bd">
        <div class="hudGrid" id="hud"></div>
        <div style="height:12px"></div>
        <div id="schedulePanel"></div>
        <div style="height:10px"></div>
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>

  <script>
    // ===============================
    // 像素版MVP说明（可迭代扩展）
    // 1) 先实现：地图走路 + 场景入口 + 臭圈持续掉SAN + 对话/选项框 + 课表流程
    // 2) 再实现：更复杂的成就/结局/道具/双人等
    // ===============================

    // ---------- DOM ----------
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const elHUD = document.getElementById('hud');
    const elLog = document.getElementById('log');
    const elObjective = document.getElementById('objective');
    const elPromptBar = document.getElementById('promptBar');
    const elOverlay = document.getElementById('overlay');
    const elOvTitle = document.getElementById('ovTitle');
    const elOvText = document.getElementById('ovText');
    const elOvCustom = document.getElementById('ovCustom');
    const elOvChoices = document.getElementById('ovChoices');
    const elTitleStart = document.getElementById('titleStart');
    const btnStartGame = document.getElementById('btnStartGame');
    const btnContinueGame = document.getElementById('btnContinueGame');
    const btnWide = document.getElementById('btnWide');
    const btnWide2 = document.getElementById('btnWide2');
    const btnOvClose = document.getElementById('ovClose');
    const btnUsePerfume = document.getElementById('btnUsePerfume');
    const btnMute = document.getElementById('btnMute');
    const btnBgm = document.getElementById('btnBgm');
    const btnMode = document.getElementById('btnMode');
    const btnSave = document.getElementById('btnSave');
    const btnClear = document.getElementById('btnClear');
    const btnInteract = document.getElementById('btnInteract');
    const btnSchedule = document.getElementById('btnSchedule');
    const btnMenu = document.getElementById('btnMenu');
    const elJoy = document.getElementById('joy');
    const elJoyKnob = document.getElementById('joyKnob');
    const elSchedulePanel = document.getElementById('schedulePanel');
    const elStageInner = document.getElementById('stageInner');

    // ---------- 存档 ----------
    const SAVE_KEY = 'ywl_pixel_save_v1';

    // ---------- 音频（BGM + 音效，纯前端合成，无需额外资源文件） ----------
    const SFX_KEY = 'ywl_pixel_sfx_muted';
    const BGM_KEY = 'ywl_pixel_bgm_muted';
    let sfxMuted = false;
    let bgmMuted = false;
    try{ sfxMuted = localStorage.getItem(SFX_KEY) === '1'; }catch{}
    try{ bgmMuted = localStorage.getItem(BGM_KEY) === '1'; }catch{}
    function syncAudioBtns(){
      if(btnMute) btnMute.textContent = sfxMuted ? '音效：关' : '音效：开';
      if(btnBgm) btnBgm.textContent = bgmMuted ? '音乐：关' : '音乐：开';
    }
    syncAudioBtns();

    let audioCtx = null;
    let bgmTimer = null;
    function ensureAudio(){
      if(audioCtx) return audioCtx;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return null;
      audioCtx = new Ctx();
      return audioCtx;
    }
    async function unlockAudio(){
      const c = ensureAudio();
      if(!c) return;
      if(c.state === 'suspended'){
        try{ await c.resume(); }catch{}
      }
    }
    // 首次交互解锁音频（手机必须）
    window.addEventListener('pointerdown', () => unlockAudio(), { once:true, passive:true });
    window.addEventListener('touchstart', () => unlockAudio(), { once:true, passive:true });
    window.addEventListener('keydown', () => unlockAudio(), { once:true });

    function playTone({ f0=440, f1=null, type='triangle', dur=0.08, vol=0.06 }){
      if(sfxMuted) return;
      const c = ensureAudio();
      if(!c) return;
      const t0 = c.currentTime;
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(f0, t0);
      if(typeof f1 === 'number'){
        osc.frequency.exponentialRampToValueAtTime(Math.max(40, f1), t0 + dur);
      }
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0001, vol), t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(g);
      g.connect(c.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.02);
    }

    function sfx(name){
      // 统一“轻快像素风”音色，和BGM不冲突：高频轻、低频短
      if(name === 'click') return playTone({ f0: 740, f1: 980, type:'square', dur:0.045, vol:0.03 });
      if(name === 'enter') return playTone({ f0: 520, f1: 1040, type:'triangle', dur:0.08, vol:0.04 });
      if(name === 'dialog') return playTone({ f0: 460, f1: 600, type:'triangle', dur:0.06, vol:0.03 });
      if(name === 'bad') return playTone({ f0: 220, f1: 150, type:'sawtooth', dur:0.10, vol:0.05 });
      if(name === 'good') return playTone({ f0: 880, f1: 660, type:'triangle', dur:0.09, vol:0.04 });
      if(name === 'use') return playTone({ f0: 660, f1: 990, type:'square', dur:0.07, vol:0.035 });
    }

    function noteToFreq(n){ return 440 * Math.pow(2, (n - 69)/12); }
    function playNote({ t, midi, dur, type='triangle', vol=0.02 }){
      const c = ensureAudio(); if(!c) return;
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(noteToFreq(midi), t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(Math.max(0.0001, vol), t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(g);
      g.connect(c.destination);
      osc.start(t);
      osc.stop(t + dur + 0.02);
    }
    function startBgm(){
      if(bgmTimer) return;
      const c = ensureAudio(); if(!c) return;
      const bpm = 128;
      const beat = 60 / bpm;
      const loopBeats = 16; // 8小节(4/4)
      const loopSec = loopBeats * beat;
      const prog = [
        { root: 60, bass: 36 }, // C
        { root: 65, bass: 41 }, // F
        { root: 67, bass: 43 }, // G
        { root: 60, bass: 36 }, // C
      ];
      const melody = [72, 74, 76, 74, 79, 77, 76, 74]; // 简单上行，活泼

      const schedule = (tStart) => {
        for(let bar=0; bar<4; bar++){
          const chord = prog[bar];
          const tBar = tStart + bar * 4 * beat;
          // bass（每拍）
          for(let i=0;i<4;i++){
            playNote({ t: tBar + i*beat, midi: chord.bass, dur: beat*0.9, type:'square', vol:0.016 });
          }
          // chord pad（每小节两次）
          const tri = [chord.root, chord.root+4, chord.root+7];
          for(let hit=0; hit<2; hit++){
            const tt = tBar + hit*2*beat;
            for(const n of tri){
              playNote({ t: tt, midi: n+12, dur: 2*beat*0.95, type:'triangle', vol:0.010 });
            }
          }
          // melody（八分音符）
          for(let i=0;i<8;i++){
            const tt = tBar + i*(beat/2);
            const n = melody[(bar*2 + Math.floor(i/4)) % melody.length];
            playNote({ t: tt, midi: n, dur: beat/2*0.8, type:'triangle', vol:0.012 });
          }
        }
      };

      // 立即排一次 + 定时器循环排
      const t0 = c.currentTime + 0.05;
      schedule(t0);
      bgmTimer = setInterval(() => {
        const now = c.currentTime;
        schedule(now + 0.05);
      }, (loopSec*1000));
    }
    function stopBgm(){
      if(bgmTimer){
        clearInterval(bgmTimer);
        bgmTimer = null;
      }
    }
    function syncBgm(){
      if(bgmMuted) stopBgm();
      else startBgm();
    }

    function seatMove(dx, dy){
      const s = ui.seat;
      if(ui.mode !== 'seat' || !s) return;
      if(s.steps <= 0){
        s._forceSeat?.();
        return;
      }
      const nx = Math.max(0, Math.min(4, s.cx + dx));
      const ny = Math.max(0, Math.min(4, s.cy + dy));
      if(nx === s.cx && ny === s.cy) return;
      s.cx = nx;
      s.cy = ny;
      s.steps -= 1; // 方向键移动也算一步
      if(s.steps <= 0){
        s._forceSeat?.();
        return;
      }
      renderOverlay();
    }

    function getCurrentSlot(){
      const p = state.phase;
      if(p !== 'morning' && p !== 'afternoon') return null;
      const slot = state.schedule?.[p]?.[state.slotIdx];
      return slot || null;
    }

    function ensureFreeChoices(slot){
      if(!slot || slot.kind !== 'free') return;
      if(slot.freeChoices && slot.freeChoices.length === 3) return;
      // 空课：固定给“图书馆”+ 另外两个随机（更符合玩家预期）
      const pool = ['playground','dorm','store'];
      slot.freeChoices = ['library', ...sample(pool, 2)];
    }

    function getAllowedPortalIds(){
      // 非游戏中：不允许进入
      if(state.screen !== 'game') return new Set();
      // 室内“返回校园”永远允许
      if(state.map !== 'campus') return new Set(['back']);
      // 校园地图：按时间段限制入口
      if(state.over) return new Set();

      // 早餐/午饭/晚饭：只允许进食堂
      if(state.phase === 'morning' && state.needBreakfast) return new Set(['cafeteria']);
      if(state.phase === 'noon' && state.needLunch) return new Set(['cafeteria']);
      if(state.phase === 'evening' && state.needDinner) return new Set(['cafeteria']);

      // 夜晚：只能去寝室（洗澡/睡觉）或小卖部
      if(state.phase === 'night') return new Set(['dorm','store']);

      // 上课/空课：严格按当前时段
      const slot = getCurrentSlot();
      if(!slot) return new Set();
      if(slot.done) return new Set(); // 理论上不会发生
      if(slot.kind === 'class'){
        // 体育课：在操场上课，不选座，触发是否乐跑
        if(slot.course === '体育课') return new Set(['playground']);
        return new Set(['classroom']);
      }
      if(slot.kind === 'free'){
        ensureFreeChoices(slot);
        return new Set(slot.freeChoices);
      }
      return new Set();
    }

    // ---------- 碰撞 ----------
    function rectsOverlap(a,b){
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }
    function pointInRect(px,py,r){
      return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
    }
    function clampToBounds(p){
      const m = currentMap();
      p.x = Math.max(m.bounds.x, Math.min(m.bounds.x + m.bounds.w - p.w, p.x));
      p.y = Math.max(m.bounds.y, Math.min(m.bounds.y + m.bounds.h - p.h, p.y));
    }
    function collideWithWalls(p){
      const m = currentMap();
      // 简化：按轴分离
      for(const w of m.walls){
        // 轻微缩小玩家碰撞盒，减少“空气墙”/卡边角的体感
        const pad = 2;
        const hit = { x: p.x + pad, y: p.y + pad, w: Math.max(1, p.w - pad*2), h: Math.max(1, p.h - pad*2) };
        if(rectsOverlap(hit, w)){
          // 回退（最简单：把玩家推回边界）
          const leftPen = (hit.x + hit.w) - w.x;
          const rightPen = (w.x + w.w) - hit.x;
          const topPen = (hit.y + hit.h) - w.y;
          const botPen = (w.y + w.h) - hit.y;
          const minPen = Math.min(leftPen, rightPen, topPen, botPen);
          if(minPen === leftPen) p.x = w.x - p.w + pad;
          else if(minPen === rightPen) p.x = w.x + w.w - pad;
          else if(minPen === topPen) p.y = w.y - p.h + pad;
          else p.y = w.y + w.h - pad;
        }
      }
    }

    // ---------- 摄像机（大地图滚动） ----------
    const cam = { x: 0, y: 0 };
    function updateCamera(){
      const m = currentMap();
      // 以玩家为中心
      const targetX = state.player.x + state.player.w/2 - canvas.width/2;
      const targetY = state.player.y + state.player.h/2 - canvas.height/2;
      const minX = m.bounds.x;
      const minY = m.bounds.y;
      const maxX = m.bounds.x + Math.max(0, m.bounds.w - canvas.width);
      const maxY = m.bounds.y + Math.max(0, m.bounds.h - canvas.height);
      cam.x = Math.max(minX, Math.min(maxX, targetX));
      cam.y = Math.max(minY, Math.min(maxY, targetY));
    }

    function npcCollide(n, m){
      // 与墙体简单碰撞：撞了就反向
      for(const w of m.walls){
        if(rectsOverlap(n, w)){
          // 反向并推离一点
          n.x -= n.vx * 3;
          n.y -= n.vy * 3;
          n.vx *= -1;
          n.vy *= -1;
          return true;
        }
      }
      return false;
    }

    function updateNPCs(dt){
      if(state.over) return;
      // 允许对话时NPC仍走动，避免“进场景就卡住”的观感；菜单/选座仍暂停
      if(ui.mode === 'menu' || ui.mode === 'seat') return;
      if(state.screen !== 'game') return;
      initNPCs();

      for(const n of state.npcs){
        if(n.map !== state.map) continue;
        const m = currentMap();
        n.t += dt;
        // 每隔一段时间随机转向
        if(n.t > 1.6 + (Math.random()*1.4)){
          n.t = 0;
          const r = Math.random();
          if(r < 0.25){ n.vx = 1; n.vy = 0; }
          else if(r < 0.50){ n.vx = -1; n.vy = 0; }
          else if(r < 0.75){ n.vx = 0; n.vy = 1; }
          else { n.vx = 0; n.vy = -1; }
        }

        const ox = n.x, oy = n.y;
        n.x += n.vx * n.speed * dt;
        n.y += n.vy * n.speed * dt;

        // 边界
        n.x = Math.max(m.bounds.x, Math.min(m.bounds.x + m.bounds.w - n.w, n.x));
        n.y = Math.max(m.bounds.y, Math.min(m.bounds.y + m.bounds.h - n.h, n.y));

        // 撞墙就反弹
        if(npcCollide(n, m)){
          // 偶尔换个方向避免卡死
          if(Math.random() < 0.35){
            const swap = n.vx;
            n.vx = n.vy;
            n.vy = swap;
          }
        }

        // 如果没动（被夹住），随机挪一挪
        if(Math.hypot(n.x-ox, n.y-oy) < 0.1){
          n.x += (Math.random()-0.5)*8;
          n.y += (Math.random()-0.5)*8;
        }
      }
    }

    // ---------- 输入 ----------
    const keys = {};
    const touchMove = { up:false, down:false, left:false, right:false };
    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
      // 游玩时阻止方向键滚动页面（避免“按了但角色不动”的错觉）
      if(ui.mode === 'play' && state.screen === 'game'){
        if(e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown'){
          e.preventDefault();
        }
      }
      if(e.key === 'Escape'){
        if(ui.mode === 'play') openMenu();
        else { ui.mode = 'play'; ui.seat = null; hideOverlay(); }
        updateFlowPrompt();
        return;
      }

      // 选座界面：方向键移动会消耗步数
      if(ui.mode === 'seat' && ui.seat){
        if(e.key === 'ArrowLeft'){ e.preventDefault(); seatMove(-1,0); return; }
        if(e.key === 'ArrowRight'){ e.preventDefault(); seatMove(1,0); return; }
        if(e.key === 'ArrowUp'){ e.preventDefault(); seatMove(0,-1); return; }
        if(e.key === 'ArrowDown'){ e.preventDefault(); seatMove(0,1); return; }
      }

      // 空格交互（仅在游玩模式）
      if(e.code === 'Space'){
        e.preventDefault();
        // 对话时也允许空格交互（避免“键盘没用”），但选座/菜单不行
        if(ui.mode !== 'seat' && ui.mode !== 'menu') interact();
      }
    });
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

    function interact(){
      if(state.over) return;
      if(ui.mode !== 'play') return;
      if(state.screen !== 'game'){
        // 开始界面：点“交互”=唤起开始菜单
        if(state.screen === 'title') showTitleMenu(loadGame());
        return;
      }
      // 优先交互“？NPC”
      if(tryMysteryInteract()) return;
      const m = currentMap();
      const px = state.player.x + state.player.w/2;
      const py = state.player.y + state.player.h/2;
      // 找到最近的入口（站在入口矩形里）
      const portal = m.portals.find(p => pointInRect(px, py, p.rect));
      if(portal){
        const allowed = getAllowedPortalIds();
        if(!allowed.has(portal.id)){
          showNotAllowedDialog();
          return;
        }
        enterPortal(portal);
        return;
      }
      // 如果没站在入口上，给提示
      logLine('（这里没啥剧情点。试试找“？NPC”，或走进蓝色大门）');
    }

    // 自动进门（替代“必须按空格/交互”）
    let portalCooldown = 0;
    let lastPortalKey = '';
    function autoEnterPortal(){
      if(state.over) return;
      if(ui.mode === 'menu' || ui.mode === 'seat') return;
      if(state.screen !== 'game') return;
      if(portalCooldown > 0) return;
      const m = currentMap();
      const px = state.player.x + state.player.w/2;
      const py = state.player.y + state.player.h/2;
      const portal = m.portals.find(p => pointInRect(px, py, p.rect));
      if(!portal) { lastPortalKey = ''; return; }

      const key = `${state.map}:${portal.id}`;
      if(key === lastPortalKey) return; // 站在同一门口不重复触发
      lastPortalKey = key;

      const allowed = getAllowedPortalIds();
      portalCooldown = 0.55;
      if(!allowed.has(portal.id)){
        showNotAllowedDialog();
        return;
      }
      enterPortal(portal);
    }

    // ---------- 流程：课表与阶段 ----------
    function buildSchedule(){
      function buildHalf(){
        const total = SLOTS_PER_HALF;
        const classCount = randInt(1,2);
        const indices = sample(Array.from({length: total}, (_,i)=>i), classCount).sort((a,b)=>a-b);
        const slots = [];
        for(let i=0;i<total;i++){
          const hasClass = indices.includes(i);
          slots.push({ kind: hasClass ? 'class' : 'free', course: hasClass ? pick(COURSE_POOL) : null, done:false });
        }
        return slots;
      }
      state.schedule = { morning: buildHalf(), afternoon: buildHalf() };
      state.slotIdx = 0;
    }

    function startDay(){
      state.ranToday = false;
      state.showeredToday = false;
      state.phase = 'morning';
      buildSchedule();
      state.needBreakfast = true;
      state.needLunch = false;
      state.needDinner = false;
      // 签到：香水+1
      state.inventory.perfume += 1;
      logLine(`第${state.day}天：签到获得香水×1。`);
      setObjectiveText();
      // 不再弹“出发”对话框（避免玩家误以为“动不了”）：直接进入游玩
      ui.mode = 'play';
      hideOverlay();
      state.map = 'campus';
      // 出生在校园主干道附近，方便新手快速找到建筑入口
      state.player.x = 900; state.player.y = 560;
      initNPCs();
      respawnFragrance();
      updateCamera();
      updateHUD();
    }

    function getFlowPrompt(){
      if(state.screen !== 'game') return '点【开始游戏】进入';
      if(state.over) return '已结算';
      const p = state.phase;
      const half = (p === 'morning' || p === 'afternoon') ? p : null;
      const labelHalf = p === 'morning' ? '上午' : (p === 'afternoon' ? '下午' : '');

      if(p === 'morning' && state.needBreakfast) return '清晨：先去食堂吃/不吃早餐';
      if(p === 'noon' && state.needLunch) return '中午：去食堂选择午饭';
      if(p === 'evening' && state.needDinner) return '傍晚：去食堂选择晚饭';

      if(half){
        if(state.slotIdx >= SLOTS_PER_HALF){
          return p === 'morning' ? '上午结束：去食堂吃午饭' : '下午结束：去食堂吃晚饭';
        }
        const slot = state.schedule?.[half]?.[state.slotIdx];
        if(!slot) return `${labelHalf}：还没生成课表（回到校园继续走）`;
        if(slot.kind === 'class'){
          if(slot.course === '体育课'){
            return `${labelHalf}第${state.slotIdx+1}节：去操场上体育课（可触发乐跑）`;
          }
          return `${labelHalf}第${state.slotIdx+1}节：去教室上课（${slot.course}）`;
        }
        const choices = slot.freeChoices?.map(id => portalName(id)).filter(Boolean);
        if(choices && choices.length){
          return `${labelHalf}第${state.slotIdx+1}节：空课——只能去：${choices.join(' / ')}`;
        }
        return `${labelHalf}第${state.slotIdx+1}节：空课——系统会给你3个地点可选`;
      }

      if(p === 'noon') return '中午：去食堂吃午饭';
      if(p === 'evening') return '傍晚：去食堂吃晚饭';
      if(p === 'night') return '夜晚：去寝室洗澡/不洗/睡觉（也可去小卖部）';
      return '在校园里行动，走进蓝色大门会自动进入';
    }

    function updateFlowPrompt(){
      const prompt = getFlowPrompt();
      elPromptBar.textContent = `当前指引：${prompt}`;
      elObjective.textContent = `目标：活到第5天 + 乐跑≥2次 ｜ 当前指引：${prompt}`;
    }

    function setObjectiveText(){
      // 兼容旧调用：统一走 updateFlowPrompt
      updateFlowPrompt();
    }

    function advancePhase(){
      if(state.over) return;
      if(state.phase === 'morning'){
        // 上午2个时段走完 → 中午
        if(state.slotIdx >= SLOTS_PER_HALF){
          state.phase = 'noon';
          state.slotIdx = 0;
          state.needLunch = true;
          openDialog({
            title: '中午到了',
            text: '按流程：现在只能去【食堂】选择午饭。',
            choices: [{ label:'去食堂', primary:true, onSelect: () => ui.mode='play' }]
          });
        }
      }else if(state.phase === 'afternoon'){
        if(state.slotIdx >= SLOTS_PER_HALF){
          state.phase = 'evening';
          state.slotIdx = 0;
          state.needDinner = true;
          openDialog({
            title: '傍晚到了',
            text: '按流程：现在只能去【食堂】选择晚饭。',
            choices: [{ label:'去食堂', primary:true, onSelect: () => ui.mode='play' }]
          });
        }
      }
      setObjectiveText();
      updateHUD();
    }

    // ---------- 事件：进入口 ----------
    function enterPortal(portal){
      if(portal.to !== state.map){
        // 切地图
        state.map = portal.to;
        const spawn = portal.spawn;
        if(spawn){
          state.player.x = spawn.x;
          state.player.y = spawn.y;
        }else{
          // 默认：进门后放在地图左下
          state.player.x = 72;
          state.player.y = 450;
        }
        logLine(`进入：${MAPS[state.map].name}`);
        sfx('enter');
        // 香人只在校园刷新
        respawnFragrance();
        // 进入某些室内，直接触发“场景事件菜单”
        onEnterMap();
        return;
      }
    }

    function randPosInMap(mapName){
      const m = MAPS[mapName];
      if(!m) return { x: 100, y: 100 };
      for(let k=0;k<40;k++){
        const x = m.bounds.x + 60 + Math.random() * (m.bounds.w - 120);
        const y = m.bounds.y + 80 + Math.random() * (m.bounds.h - 140);
        // 不要刷在墙体里
        let ok = true;
        for(const w of m.walls){
          if(x > w.x-30 && x < w.x+w.w+30 && y > w.y-30 && y < w.y+w.h+30){
            ok = false; break;
          }
        }
        if(ok) return { x, y };
      }
      return { x: m.bounds.x + m.bounds.w/2, y: m.bounds.y + m.bounds.h/2 };
    }

    function respawnFragrance(){
      // 香人只在“大地图（校园）”刷新：每次出现6秒后换位置
      if(state.map !== 'campus') return;
      const pos = randPosInMap('campus');
      state.fragrance.map = 'campus';
      state.fragrance.x = pos.x;
      state.fragrance.y = pos.y;
      state.fragrance.r = 46;
      state.fragrance.ttl = 5.0;
      state.fragrance.claimed = false;
    }

    function updateFragrance(dt){
      if(state.over) return;
      if(ui.mode === 'menu' || ui.mode === 'seat') return;
      if(state.screen !== 'game') return;
      if(!state.fragrance) return;

      // 只在校园刷新/生效
      if(state.map !== 'campus') return;

      // 确保一直有一个（在校园）
      if(state.fragrance.map !== 'campus') respawnFragrance();
      if(state.fragrance.ttl <= 0) respawnFragrance();

      state.fragrance.ttl -= dt;

      // 进入香圈 +3 SAN（每次出现只给一次）
      const fx = state.fragrance.x;
      const fy = state.fragrance.y;
      const r = state.fragrance.r;
      const px = state.player.x + state.player.w/2;
      const py = state.player.y + state.player.h/2;
      const d = Math.hypot(px - fx, py - fy);
      if(d <= r && !state.fragrance.claimed){
        state.fragrance.claimed = true;
        addSan(15);
        logLine('你蹭到香人光环：SAN +15（强力清新）');
        sfx('good');
      }
    }

    function respawnMystery(){
      if(state.map !== 'campus') return;
      const pos = randPosInMap('campus');
      state.mystery.map = 'campus';
      state.mystery.x = pos.x;
      state.mystery.y = pos.y;
      state.mystery.active = true;
      state.mystery.ttl = 10.0;
    }
    function updateMystery(dt){
      if(!state.mystery) return;
      if(state.screen !== 'game') return;
      if(state.map !== 'campus'){ state.mystery.active = false; return; }
      if(state.mystery.cool > 0) state.mystery.cool = Math.max(0, state.mystery.cool - dt);
      if(state.mystery.active){
        state.mystery.ttl -= dt;
        if(state.mystery.ttl <= 0){
          state.mystery.active = false;
          state.mystery.cool = 8.0;
        }
      }else{
        // 平均十几秒刷一次
        if(state.mystery.cool <= 0 && Math.random() < dt * 0.08){
          respawnMystery();
        }
      }
    }

    function tryMysteryInteract(){
      if(!state.mystery?.active) return false;
      if(state.map !== 'campus') return false;
      const px = state.player.x + state.player.w/2;
      const py = state.player.y + state.player.h/2;
      const d = Math.hypot(px - state.mystery.x, py - state.mystery.y);
      if(d > 46) return false;

      state.mystery.active = false;
      state.mystery.cool = 16.0;

      const events = [
        { title:'？同学：发传单', text:'“同学，扫码入群！社团都在等你。”\n你心一软……', apply: () => { state.influence += 12; applySan(-6, 'normal'); logLine('随机事件：社团传单 → 影响力+12（触发扣SAN，可选择用影响力抵消）'); } },
        { title:'？同学：捡到零钱', text:'你在地上捡到一张皱巴巴的20。', apply: () => { state.money += 20; logLine('随机事件：捡钱 → +20R'); } },
        { title:'？同学：香水试用', text:'“免费喷一下，包清新。”\n你抱着怀疑试了试。', apply: () => { addSan(10); logLine('随机事件：香水试用 → SAN +10'); } },
        { title:'？同学：臭味挑战', text:'“敢不敢闻一下这个？”\n你后悔了。', apply: () => { applySan(-18, 'normal'); logLine('随机事件：臭味挑战 → 触发扣SAN（可选择用影响力抵消）'); } },
        { title:'？同学：借火', text:'烟味袭来。\n“同学借个火？”', apply: () => { state.stats.smokeEncounters += 1; if(state.stats.smokeEncounters >= 6) unlockAchievement('smokeMagnet'); state.influence += 8; applySan(-10, 'smoke'); logLine('随机事件：借火烟人 → 遭遇烟人+1，影响力+8（触发扣SAN，可选择用影响力抵消）'); } },
        { title:'？同学：送你一瓶', text:'“今天心情好，送你一瓶快乐水券。”\n（但你钱包更空了）', apply: () => { if(state.money >= 30) state.money -= 30; addSan(15); logLine('随机事件：快乐水券 → -30R，SAN +15'); } },
        { title:'？同学：这题会吗', text:'“同学这题会吗？”\n你开始怀疑自己为什么要来上大学。', apply: () => { applySan(-8, 'normal'); state.talkRisk = Math.min(100, state.talkRisk + 10); logLine('随机事件：不会做题 → 触发扣SAN（可选择用影响力抵消），约谈风险+10%'); } },
      ];
      const ev = events[Math.floor(Math.random()*events.length)];
      ev.apply?.();
      if(state.over) return true;
      updateHUD();
      updateFlowPrompt();
      openDialog({
        title: ev.title,
        text: ev.text,
        choices: [{ label:'继续', primary:true, onSelect: () => { ui.mode='play'; } }]
      });
      return true;
    }

    function onEnterMap(){
      const m = currentMap();
      // 不同地图不同事件入口：MVP用“进入后弹一次菜单”
      if(m.name === '教室'){
        handleClassroomEntry();
      }else if(m.name === '图书馆'){
        handleLibraryEntry();
      }else if(m.name === '食堂'){
        handleCafeteriaEntry();
      }else if(m.name === '操场'){
        handlePlaygroundEntry();
      }else if(m.name === '寝室'){
        handleDormEntry();
      }else if(m.name === '小卖部'){
        handleStoreEntry();
      }
    }

    // ---------- 规则：影响力过高 课后扣SAN ----------
    function applyHighInfluencePenalty(where){
      // 新规则：影响力 > 100 后，每次上课（课后结算）SAN -25
      // 兼容保留：40~100 仍给一个较轻惩罚（SAN -15），让玩家有“逐步变难”的感觉
      if(state.influence > 100){
        const opened = applySan(-25, 'highInfluenceClass');
        logLine(`${where}：影响力爆表（${state.influence}）→ ${opened ? '触发扣SAN（可选择用影响力抵消）' : 'SAN -25（同学们开始捂鼻子）'}`);
        return;
      }
      if(state.influence >= 40){
        const opened = applySan(-15, 'highInfluenceClass');
        logLine(`${where}：影响力偏高（${state.influence}）→ ${opened ? '触发扣SAN（可选择用影响力抵消）' : 'SAN -15'}`);
      }
    }

    function determineDeathEnding(context){
      // 失败结局（按你文档的优先级 + 兜底）
      // context 只是“本次扣SAN的来源”，最终结局还会看 day/统计
      if(context === 'food') return '食堂惨案';
      if(context === 'deadline5') return '咫尺成功';
      if(context === 'breakSecond') return '三和大神';
      if(context === 'talk' && state.talkTimes >= 4) return '导员之友';
      if(state.stats.smokeEncounters >= 8) return '烟雾缭绕';
      // 第五天午饭后SAN归零：咫尺成功（我们近似：第5天中午/下午/傍晚倒下）
      if(state.day === 5 && (state.phase === 'noon' || state.phase === 'afternoon' || state.phase === 'evening')) return '咫尺成功';
      if(state.day === 3 || state.day === 4) return '中道崩殂';
      return '肺部感染';
    }

    function calcOffsetInfluence(loss, context){
      // “用影响力抵消扣SAN”的代价：越痛越贵；臭圈稍微便宜一点（避免完全崩盘）
      const base = (context === 'stink') ? 5 : 8;
      const k = (context === 'seat' || context === 'forcedSeat') ? 1.05 : 0.95;
      return Math.max(6, Math.min(45, Math.ceil(loss * k + base)));
    }

    function applySanDirect(loss, context){
      state.san -= loss;
      sfx('bad');
      if(state.san <= 0 && !state.over){
        state.over = true;
        state.ending = determineDeathEnding(context);
        showResultScreen(false);
      }
    }

    function openSanOffsetDialog(loss, context, opts){
      const isStinkPolicy = !!opts?.stinkPolicy;
      const cost = calcOffsetInfluence(loss, context);
      const tip = isStinkPolicy
        ? `你进入了臭圈。\n选择一次，对接下来10秒有效（避免每一步都弹窗）。\n本次：SAN -${loss}（或 影响力 +${cost} 抵消）`
        : `本次：SAN -${loss}\n你可以选择“硬扛”，或用“影响力上涨”抵消这次扣除。`;

      openDialog({
        title: 'SAN受损：要怎么扛？',
        text: tip,
        choices: [
          { label: `硬扛（SAN -${loss}）`, primary:true, onSelect: () => {
            if(isStinkPolicy){ state.stinkPolicy = 'san'; state.stinkPolicyUntil = timeSec + 10; }
            ui.mode = 'play';
            hideOverlay();
            applySanDirect(loss, context);
            logLine(`你选择硬扛：SAN -${loss}`);
            updateHUD(); updateFlowPrompt();
          }},
          { label: `抵消（影响力 +${cost}）`, onSelect: () => {
            if(isStinkPolicy){ state.stinkPolicy = 'inf'; state.stinkPolicyUntil = timeSec + 10; }
            ui.mode = 'play';
            hideOverlay();
            state.influence += cost;
            sfx('click');
            logLine(`你用影响力抵消扣SAN：影响力 +${cost}（本次SAN不扣）`);
            updateHUD(); updateFlowPrompt();
          }},
        ]
      });
    }

    // 用于“扣SAN后还要继续后续剧情”的场景：在玩家做出选择后再执行 afterResolve
    function applySanWithChoice(loss, context, afterResolve, opts){
      if(state.over){ afterResolve?.(); return false; }
      if(ui.mode !== 'play' || state.screen !== 'game'){
        applySanDirect(loss, context);
        afterResolve?.();
        return false;
      }
      const isStinkPolicy = !!opts?.stinkPolicy;
      const cost = calcOffsetInfluence(loss, context);
      const tip = isStinkPolicy
        ? `你进入了臭圈。\n选择一次，对接下来10秒有效。\n本次：SAN -${loss}（或 影响力 +${cost} 抵消）`
        : `本次：SAN -${loss}\n选择“硬扛”，或用“影响力上涨”抵消这次扣除。`;
      openDialog({
        title: 'SAN受损：要怎么扛？',
        text: tip,
        choices: [
          { label: `硬扛（SAN -${loss}）`, primary:true, onSelect: () => {
            if(isStinkPolicy){ state.stinkPolicy = 'san'; state.stinkPolicyUntil = timeSec + 10; }
            ui.mode = 'play';
            hideOverlay();
            applySanDirect(loss, context);
            logLine(`你选择硬扛：SAN -${loss}`);
            updateHUD(); updateFlowPrompt();
            afterResolve?.();
          }},
          { label: `抵消（影响力 +${cost}）`, onSelect: () => {
            if(isStinkPolicy){ state.stinkPolicy = 'inf'; state.stinkPolicyUntil = timeSec + 10; }
            ui.mode = 'play';
            hideOverlay();
            state.influence += cost;
            sfx('click');
            logLine(`你用影响力抵消扣SAN：影响力 +${cost}（本次SAN不扣）`);
            updateHUD(); updateFlowPrompt();
            afterResolve?.();
          }},
        ]
      });
      return true;
    }

    // 返回值：true=弹出选择框（本次扣SAN被延后处理/或已在回调处理），false=已直接结算
    function applySan(delta, context){
      if(delta >= 0){
        addSan(delta);
        return false;
      }
      if(state.over) return false;
      const loss = Math.abs(delta);

      // 非游玩态（例如选座/菜单里）不再弹二次框，直接结算
      if(ui.mode !== 'play' || state.screen !== 'game'){
        applySanDirect(loss, context);
        return false;
      }

      // 臭圈会频繁扣SAN：改成“进入臭圈时选一次，持续10秒”
      if(context === 'stink'){
        if(state.stinkPolicyUntil && timeSec < state.stinkPolicyUntil){
          if(state.stinkPolicy === 'inf'){
            const cost = calcOffsetInfluence(loss, context);
            state.influence += cost;
            logLine(`臭圈扣SAN被抵消：影响力 +${cost}`);
            updateHUD();
            return false;
          }
          applySanDirect(loss, context);
          return false;
        }
        // 第一次触发：弹一次“策略选择”，并由回调处理本次扣除
        state.stinkPolicyUntil = 0;
        state.stinkPolicy = '';
        openSanOffsetDialog(loss, context, { stinkPolicy:true });
        return true;
      }

      // 其它扣SAN：每次都给选择
      openSanOffsetDialog(loss, context, {});
      return true;
    }

    function addSan(delta){
      state.san += delta;
      if(state.san > 100) state.san = 100;
      if(state.san < -9999) state.san = -9999;
    }

    function showChoiceResult(title, text, onContinue){
      openDialog({
        title,
        text,
        choices: [
          { label:'继续', primary:true, onSelect: () => { ui.mode = 'play'; onContinue?.(); } }
        ]
      });
    }

    // ---------- 事件：早餐/午饭/晚饭 ----------
    function handleCafeteriaEntry(){
      if(state.over) return;
      if(state.phase === 'morning' && state.needBreakfast){
        // 早餐
        openDialog({
          title: '早餐选择',
          text: '食堂阿姨盯着你：\n“同学，吃不吃？不吃我可收摊了。”',
          choices: [
            { label:'吃早餐（-5R）', primary:true, onSelect: () => {
              if(state.money < 5){ logLine('钱不够吃早餐。'); return; }
              state.money -= 5;
              logLine('早餐：吃了（-5R）。');
              state.needBreakfast = false;
              showChoiceResult('早餐结算', '你端起盘子就是一顿猛炫。\n结果：-5R（SAN不变）\n系统：吃饱了才有力气被熏。', () => {
                updateFlowPrompt();
              });
            }},
            { label:'不吃（SAN -40）', onSelect: () => {
              logLine('早餐：不吃。');
              const opened = applySanWithChoice(40, 'food', () => {
                state.needBreakfast = false;
                if(state.over) return;
                showChoiceResult('早餐结算', '你选择把早餐省给未来的自己。\n系统：这笔账，未来会算。\n（扣SAN可选择用影响力抵消）', () => {
                  updateFlowPrompt();
                });
              });
              // 若弹了选择框，后续流程会在回调里继续
              if(opened) return;
              // 未弹框（非游玩态）则继续执行回调
            }},
          ]
        });
        return;
      }
      if(state.phase === 'noon' && state.needLunch){
        mealChoice('午饭', 20, () => {
          state.needLunch = false;
          state.phase = 'afternoon';
          state.slotIdx = 0;
          logLine('午饭结束：进入下午时段。');
          updateFlowPrompt();
        });
        return;
      }
      if(state.phase === 'evening' && state.needDinner){
        mealChoice('晚饭', 20, () => {
          state.needDinner = false;
          state.phase = 'night';
          logLine('晚饭结束：进入夜晚。');
          updateFlowPrompt();
        });
        return;
      }
      openDialog({
        title: '食堂',
          text: '你闻到了油烟味。\n系统：现在不是饭点，窗口对你冷漠关闭。',
          choices: [{ label:'撤', primary:true, onSelect: () => ui.mode='play' }]
      });
    }

    function mealChoice(title, prettySan, after){
      openDialog({
        title,
        text: '你站在窗口前，闻到了“今日限定”的复杂气味。\n要吃什么？',
        choices: [
          { label:'普通饭（-10R，无SAN）', primary:true, onSelect: () => {
            if(state.money < 10){ logLine('钱不够。'); return; }
            state.money -= 10;
            logLine(`${title}：普通饭 -10R`);
            showChoiceResult(`${title}结算`, '普通饭：朴实无华，但至少是饭。\n结果：-10R（SAN不变）', () => {
              updateHUD();
              after?.();
            });
          }},
          { label:`漂亮饭（-30R，SAN +${prettySan}）`, onSelect: () => {
            if(state.money < 30){ logLine('钱不够。'); return; }
            state.money -= 30;
            addSan(prettySan);
            logLine(`${title}：漂亮饭 -30R，SAN +${prettySan}`);
            showChoiceResult(`${title}结算`, `漂亮饭：一口下去，世界都变得更顺眼。\n结果：-30R，SAN +${prettySan}（上限100）`, () => {
              updateHUD();
              after?.();
            });
          }},
          { label:'不吃（SAN -20）', onSelect: () => {
            const opened = applySanWithChoice(20, 'food', () => {
              if(state.over) return;
              showChoiceResult(`${title}结算`, '你不吃饭。\n系统：你这是在挑战人类极限。\n（扣SAN可选择用影响力抵消）', () => {
                updateHUD();
                after?.();
              });
            });
            if(opened) return;
          }},
        ]
      });
    }

    // ---------- 事件：教室（必然选座 + 随机放风） ----------
    function handleClassroomEntry(){
      if(state.over) return;
      const half = (state.phase === 'morning') ? 'morning' : (state.phase === 'afternoon' ? 'afternoon' : null);
      if(!half){
        openDialog({
          title: '教室',
          text: '现在不是上课阶段。',
          choices: [{ label:'离开', onSelect: () => ui.mode='play' }]
        });
        return;
      }
      const slot = state.schedule?.[half]?.[state.slotIdx];
      if(!slot){
        openDialog({
          title: '教室',
          text: '你现在没有课要上。',
          choices: [{ label:'离开', onSelect: () => ui.mode='play' }]
        });
        return;
      }
      if(slot.done){
        openDialog({
          title: '教室',
          text: '这一时段你已经处理过了，去下一个时段吧。',
          choices: [{ label:'好', onSelect: () => ui.mode='play' }]
        });
        return;
      }

      const courseName = slot.kind === 'class' ? slot.course : '（空课）';
      const isClass = slot.kind === 'class';

      if(!isClass){
        openDialog({
          title: '教室',
          text: '这节没课，你没必要来教室。',
          choices: [{ label:'离开', onSelect: () => ui.mode='play' }]
        });
        return;
      }

      if(courseName === '体育课'){
        openDialog({
          title: '走错了',
          text: '体育课不在教室。\n系统：请去【操场】上课（那里会触发是否乐跑）。',
          choices: [{ label:'我这就去', primary:true, onSelect: () => { ui.mode='play'; } }]
        });
        return;
      }

      openDialog({
        title: `上课：${courseName}`,
        text: '要不要上？（上课必然触发选座）',
        choices: [
          { label:'去上课（选座）', onSelect: () => {
            ui.mode = 'play';
            startSeatMiniGame(courseName, () => {
              slot.done = true;
              // 课间：可选择放风/不放风
              triggerBreakChoice(() => {
                applyHighInfluencePenalty('课后结算');
                if(state.over) return;
                state.slotIdx += 1;
                setObjectiveText();
                updateHUD();
                // 若本时段结束，自动推进到午饭/傍晚
                if(state.slotIdx >= SLOTS_PER_HALF){
                  advancePhase();
                }
              });
            });
          }},
          { label:'翘课（约谈风险 +20%）', onSelect: () => {
            state.talkRisk = Math.min(100, state.talkRisk + 20);
            logLine(`翘课：约谈风险 +20%（${state.talkRisk}%）`);
            // 每次翘课单独判定是否触发约谈（按当前累计概率）
            const roll = Math.random() * 100;
            if(roll < state.talkRisk){
              state.talkTimes += 1;
              const opened = applySanWithChoice(50, 'talk', () => {
                state.talkRisk = 50; // 被约谈后重置回50%
                logLine('导员约谈触发：扣SAN（可选择用影响力抵消），风险重置到50%');
                if(state.over) return;
                showChoiceResult('导员约谈', '辅导员：你怎么又来了？\n结果：约谈风险重置到 50%\n（扣SAN可选择用影响力抵消）\n（你甚至记住了办公室的Wi‑Fi密码）');
              });
              if(opened) return;
            }else{
              logLine('这次侥幸没被约谈。');
              showChoiceResult('翘课结果', '你成功消失在签到表的盲区。\n结果：侥幸没被约谈（暂时）。');
            }
            slot.done = true;
            state.slotIdx += 1;
            setObjectiveText();
            updateHUD();
            if(state.slotIdx >= SLOTS_PER_HALF) advancePhase();
          }},
          { label:'离开', onSelect: () => ui.mode='play' }
        ]
      });
    }

    function triggerBreakChoice(done){
      openDialog({
        title: '课间',
        text: '要不要出去放风？\n（放风有机会回血，也有机会遇到烟人）',
        choices: [
          { label:'去放风', primary:true, onSelect: () => { ui.mode='play'; triggerBreakEvent(done); } },
          { label:'不放风（直接回教室）', onSelect: () => {
            showChoiceResult('课间结果', '你选择不放风。\n结果：无事发生（但也没回血）。', () => { done?.(); });
          }},
        ]
      });
    }

    function triggerBreakEvent(done){
      // 前半段
      const firstSmoke = Math.random() < 0.40;
      if(firstSmoke){
        state.stats.smokeEncounters += 1;
        if(state.stats.smokeEncounters >= 6) unlockAchievement('smokeMagnet');
        state.influence += 10;
        const opened = applySanWithChoice(26, 'smoke', () => {
          logLine('课间放风（前半段）：烟人出现！影响力+10（扣SAN可选择用影响力抵消）');
          if(state.over) return;
          openDialog({
            title: '课间放风（前半段）',
            text: '烟人刷脸：你要不要立刻离开？',
            choices: [
              { label:'立刻离开（时间管理大师条件之一）', onSelect: () => {
                unlockAchievement('time');
                showChoiceResult('放风结果', '你当机立断：撤！\n结果：成功保住剩余理智\n系统：犹豫就会败北。', () => { done?.(); });
              }},
              { label:'留下进入后半段', onSelect: () => {
                showChoiceResult('放风选择', '你不信邪：再待一会儿。\n系统：好的，马上给你安排。', () => {
                  triggerBreakSecondHalf(done);
                });
              }}
            ]
          });
        });
        if(opened) return;
      }else{
        addSan(30);
        logLine('课间放风（前半段）：空气清新，SAN+30（鼻子：谢天谢地）');
        openDialog({
          title: '课间放风（前半段）',
          text: '你深吸一口气，精神回来了。\n要不要继续放风到后半段？',
          choices: [
            { label:'离开', onSelect: () => { showChoiceResult('放风结果', '你见好就收。\n结果：带着这口清新回教室。', () => { done?.(); }); } },
            { label:'继续到后半段', onSelect: () => { showChoiceResult('放风选择', '你决定继续放风。\n系统：祝你好运。', () => { triggerBreakSecondHalf(done); }); } }
          ]
        });
      }
    }

    // ---------- 事件：寝室 ----------
    function handleDormEntry(){
      if(state.over) return;
      if(state.phase !== 'night'){
        // 白天进寝室：回复SAN，概率烟人
        const smoker = Math.random() < 0.30;
        const slot = getCurrentSlot();
        if(smoker){
          state.stats.smokeEncounters += 1;
          if(state.stats.smokeEncounters >= 6) unlockAchievement('smokeMagnet');
          state.influence += 10;
          addSan(6);
          logLine('寝室：烟人出现 → 影响力+10，SAN只回+6（他还问你借火…）');
        }else{
          addSan(12);
          logLine('寝室：躺一会儿 → SAN +12（床：还是床靠谱）');
        }
        finishFreeSlotIfNeeded(slot, '寝室');
        updateHUD();
        openDialog({
          title: '寝室',
          text: '你已经消耗了这一节空课时段。',
          choices: [{ label:'继续', primary:true, onSelect: () => { ui.mode='play'; hideOverlay(); updateFlowPrompt(); } }]
        });
        return;
      }
      // 夜晚：洗澡/不洗/睡觉
      openDialog({
        title: '夜晚：寝室',
        text: '夜深了。\n系统：请做出你人生中最难的决定之一——洗不洗。',
        choices: [
          { label:'洗澡（影响力-20，-5R，SAN-5）', onSelect: () => {
            if(state.showeredToday){
              showChoiceResult('洗澡失败', '系统提示：一天只能洗一次澡。\n结果：你只能选择摆烂（或直接睡觉）。');
              return;
            }
            state.showeredToday = true;
            const before = state.influence;
            state.influence = Math.max(0, state.influence - 20);
            if(state.money >= 5) state.money -= 5;
            const opened = applySanWithChoice(5, 'normal', () => {
              state.stats.showers += 1;
              if(state.stats.showers >= 5) unlockAchievement('shower');
              logLine(`洗澡：影响力 ${before}→${state.influence}，-5R（扣SAN可选择用影响力抵消）`);
              if(state.over) return;
              showChoiceResult('洗澡结算', '你认真搓了搓。\n结果：影响力 -20（扣到0为止），-5R\nSAN：本次扣除可选择用影响力抵消\n系统：你身上终于有人类的气息了。', () => {

                updateFlowPrompt();
              });

              updateHUD();
              updateFlowPrompt();
            });
          }},
          { label:'睡觉（SAN +20，进入下一天）', onSelect: () => {
            addSan(20);
            logLine('睡觉：SAN +20（关机成功）');

              endGame();

            showChoiceResult('睡觉结算', '你把世界按下了暂停键。\n结果：SAN +20（上限100）\n系统：明天继续受苦。', () => {
              state.day += 1;
              state.phase = 'morning';

        ]
      });
    }
